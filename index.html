<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>即時互動大廳</title>
    <!-- 引入 Tailwind CSS 快速排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- 引入 WordCloud2.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <style>
        #wordCloudCanvas { width: 100% !important; height: 350px !important; }
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; background-color: #f3f4f6; }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col items-center py-10">

    <!-- 標題與狀態 -->
    <div class="w-full max-w-3xl px-4 text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">🔥 即時互動大廳</h1>
        <p id="statusText" class="text-sm text-yellow-600 font-medium">資料庫連線中...</p>
    </div>

    <div class="w-full max-w-3xl px-4 flex flex-col gap-8">
        
        <!-- 投票區塊 -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
            <h2 id="pollTitleEl" class="text-xl font-bold mb-4 flex items-center gap-2">
                📊 載入投票題目中...
            </h2>
            <div class="flex flex-wrap gap-3 justify-center mb-6" id="voteButtons">
                <!-- 投票按鈕將由 JavaScript 動態生成 -->
            </div>
            <div class="relative w-full h-64">
                <canvas id="voteChart"></canvas>
            </div>
        </div>

        <!-- 文字雲區塊 -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-10">
            <h2 id="wordCloudTitleEl" class="text-xl font-bold mb-4 flex items-center gap-2">
                ☁️ 載入文字雲題目中...
            </h2>
            <div class="flex flex-col sm:flex-row gap-3 justify-center mb-6">
                <input type="text" id="wordInput" placeholder="輸入關鍵字..." class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                <button id="submitWordBtn" class="px-6 py-2 bg-gray-800 text-white rounded-lg font-medium hover:bg-gray-700 transition disabled:opacity-50 whitespace-nowrap">送出文字</button>
            </div>
            <div class="w-full bg-gray-50 rounded-lg overflow-hidden flex justify-center items-center">
                <canvas id="wordCloudCanvas" width="800" height="400"></canvas>
            </div>
        </div>

        <!-- 管理員隱藏面板 -->
        <div id="adminPanel" class="hidden bg-red-50 border border-red-200 rounded-2xl p-6 mb-8 shadow-inner">
            <h3 class="text-lg font-bold text-red-800 mb-4 flex items-center gap-2">⚙️ 管理員控制台 (設定題目)</h3>
            <div class="flex flex-col gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">投票區標題</label>
                    <input type="text" id="editPollTitle" class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-red-500 focus:border-red-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">投票選項 (請用「半形逗號」隔開)</label>
                    <input type="text" id="editPollOptions" placeholder="例如: 選項一,選項二,選項三" class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-red-500 focus:border-red-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">文字雲區標題</label>
                    <input type="text" id="editWordCloudTitle" class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-red-500 focus:border-red-500">
                </div>
                <button id="saveConfigBtn" class="mt-2 w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded transition">
                    💾 儲存設定並重置舊資料
                </button>
            </div>
        </div>
        
        <!-- 管理員按鈕 -->
        <div class="w-full text-center mb-10 flex justify-center gap-4">
            <button id="toggleAdminBtn" class="text-sm text-gray-400 hover:text-blue-500 transition underline decoration-dashed">
                ⚙️ 管理員設定 (需密碼)
            </button>
            <button id="clearDataBtn" class="text-sm text-gray-400 hover:text-red-500 transition underline decoration-dashed">
                🗑️ 僅清除活動資料
            </button>
        </div>
    </div>

    <!-- 自訂 Modal (取代被封鎖的 prompt/alert/confirm) -->
    <div id="customModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50">
        <div class="bg-white rounded-xl p-6 max-w-sm w-full mx-4 shadow-2xl transform transition-all">
            <h3 id="modalTitle" class="text-xl font-bold mb-2 text-gray-800">提示</h3>
            <p id="modalMessage" class="text-sm text-gray-600 mb-4"></p>
            <input type="password" id="modalInput" placeholder="輸入密碼..." class="hidden w-full px-4 py-2 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <div class="flex justify-end gap-3 mt-2">
                <button id="modalCancelBtn" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition font-medium">取消</button>
                <button id="modalConfirmBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium shadow-sm">確定</button>
            </div>
        </div>
    </div>

    <!-- Firebase 與核心邏輯 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ============================================================================
        // 🚨 準備上線到 GitHub 必看！請在這裡填入你的 Firebase Config 🚨
        // ============================================================================
        const MY_FIREBASE_CONFIG = {
            // 請將 Firebase 控制台取得的 apiKey, authDomain 等參數貼在下方：
            // apiKey: "AIzaSyBxt9NlzZHV0sNhCM0HSbOUd86wVRyjb4k",
            // authDomain: "live-interact-app.firebaseapp.com",
            // projectId: "live-interact-app",
            // storageBucket: "live-interact-app.firebasestorage.app",
            // messagingSenderId: "1071597025780",
            // appId: "1:1071597025780:web:8e9b9261f24d78f1b3e1a1"
        };
        // ============================================================================

        // 自動判斷環境：如果在畫布預覽用內建的，如果發布出去用你填寫的 MY_FIREBASE_CONFIG
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : MY_FIREBASE_CONFIG;
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'demo-interact-app';

        // 資料庫路徑定義 (新增 config 路徑)
        const configDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'appData', 'config');
        const votesDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'appData', 'votes');
        const wordsDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'appData', 'words');

        // UI 元素
        const statusText = document.getElementById('statusText');
        const wordInput = document.getElementById('wordInput');
        const submitWordBtn = document.getElementById('submitWordBtn');
        const voteButtonsContainer = document.getElementById('voteButtons');
        
        // 管理員 UI 元素
        const adminPanel = document.getElementById('adminPanel');
        const toggleAdminBtn = document.getElementById('toggleAdminBtn');
        const clearDataBtn = document.getElementById('clearDataBtn');
        const saveConfigBtn = document.getElementById('saveConfigBtn');
        const editPollTitle = document.getElementById('editPollTitle');
        const editPollOptions = document.getElementById('editPollOptions');
        const editWordCloudTitle = document.getElementById('editWordCloudTitle');
        const pollTitleEl = document.getElementById('pollTitleEl');
        const wordCloudTitleEl = document.getElementById('wordCloudTitleEl');

        // 自訂 Modal 邏輯
        const customModal = document.getElementById('customModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        const modalInput = document.getElementById('modalInput');
        const modalCancelBtn = document.getElementById('modalCancelBtn');
        const modalConfirmBtn = document.getElementById('modalConfirmBtn');

        function showModal({ title, message, type = 'alert' }) {
            return new Promise((resolve) => {
                modalTitle.innerText = title;
                modalMessage.innerText = message;
                
                if (type === 'prompt') {
                    modalInput.classList.remove('hidden');
                    modalInput.value = '';
                    setTimeout(() => modalInput.focus(), 100);
                } else {
                    modalInput.classList.add('hidden');
                }

                if (type === 'alert') {
                    modalCancelBtn.classList.add('hidden');
                } else {
                    modalCancelBtn.classList.remove('hidden');
                }

                customModal.classList.remove('hidden');

                const cleanup = () => {
                    customModal.classList.add('hidden');
                    modalConfirmBtn.onclick = null;
                    modalCancelBtn.onclick = null;
                    modalInput.onkeypress = null;
                };

                const confirmAction = () => {
                    cleanup();
                    resolve(type === 'prompt' ? modalInput.value : true);
                };

                modalConfirmBtn.onclick = confirmAction;
                modalInput.onkeypress = (e) => { if (e.key === 'Enter') confirmAction(); };

                modalCancelBtn.onclick = () => {
                    cleanup();
                    resolve(type === 'prompt' ? null : false);
                };
            });
        }

        // 預設顏色陣列
        const chartColors = [
            'rgba(59, 130, 246, 0.7)', 'rgba(34, 197, 94, 0.7)', 'rgba(239, 68, 68, 0.7)', 
            'rgba(245, 158, 11, 0.7)', 'rgba(139, 92, 246, 0.7)', 'rgba(14, 165, 233, 0.7)'
        ];

        const ctx = document.getElementById('voteChart').getContext('2d');
        const voteChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: [], datasets: [{ label: '目前票數', data: [], backgroundColor: [], borderWidth: 1, borderRadius: 4 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }, plugins: { legend: { display: false } } }
        });

        // 3. 處理身分驗證 (含錯誤回報機制)
        const initAuth = async () => {
            // 檢查是否沒有填寫 Config
            if (Object.keys(firebaseConfig).length === 0) {
                statusText.innerText = "❌ 尚未設定 Firebase Config，請在程式碼中填寫金鑰！";
                statusText.className = "text-sm text-red-600 font-bold";
                return;
            }

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    // 如果在 GitHub 上運行，會執行匿名登入
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("驗證失敗:", error);
                // 顯示具體錯誤，例如 auth/operation-not-allowed 代表沒開匿名登入
                statusText.innerText = `❌ 連線失敗 (${error.code})：請確認 Firebase 是否已開啟「匿名登入」`;
                statusText.className = "text-sm text-red-600 font-bold";
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                statusText.innerText = "🟢 已連線，資料即時同步中";
                statusText.className = "text-sm text-green-600 font-medium";
                setupRealtimeListeners();
                setupEventListeners();
            }
        });

        function setupRealtimeListeners() {
            onSnapshot(configDocRef, (docSnap) => {
                if (!docSnap.exists()) {
                    setDoc(configDocRef, {
                        pollTitle: "📊 即時投票：最想參與的訓練課程？",
                        pollOptions: ["救護技術", "繩索救援", "火場指揮"],
                        wordCloudTitle: "☁️ 文字雲：你對「消防員」的第一印象？"
                    });
                    return;
                }

                const config = docSnap.data();
                pollTitleEl.innerText = config.pollTitle || "📊 投票區";
                wordCloudTitleEl.innerText = config.wordCloudTitle || "☁️ 文字雲";

                voteButtonsContainer.innerHTML = '';
                const options = config.pollOptions || [];
                options.forEach((opt, index) => {
                    const btn = document.createElement('button');
                    const colorClasses = ['bg-blue-500', 'bg-green-500', 'bg-red-500', 'bg-yellow-500', 'bg-purple-500', 'bg-sky-500'];
                    const hoverClasses = ['hover:bg-blue-600', 'hover:bg-green-600', 'hover:bg-red-600', 'hover:bg-yellow-600', 'hover:bg-purple-600', 'hover:bg-sky-600'];
                    const cIdx = index % colorClasses.length;
                    
                    btn.className = `vote-btn px-4 py-2 text-white rounded-lg font-medium transition ${colorClasses[cIdx]} ${hoverClasses[cIdx]} disabled:opacity-50`;
                    btn.innerText = opt;
                    btn.onclick = async () => {
                        btn.classList.add('scale-95', 'opacity-80');
                        setTimeout(() => btn.classList.remove('scale-95', 'opacity-80'), 150);
                        await setDoc(votesDocRef, { [opt]: increment(1) }, { merge: true });
                    };
                    voteButtonsContainer.appendChild(btn);
                });

                voteChart.data.labels = options;
                voteChart.data.datasets[0].backgroundColor = options.map((_, i) => chartColors[i % chartColors.length]);
                voteChart.data.datasets[0].borderColor = options.map((_, i) => chartColors[i % chartColors.length].replace('0.7)', '1)'));
                voteChart.update();

                editPollTitle.value = config.pollTitle;
                editPollOptions.value = options.join(',');
                editWordCloudTitle.value = config.wordCloudTitle;
            }, (error) => {
                console.error("讀取設定檔失敗:", error);
                statusText.innerText = `❌ 資料讀取失敗 (${error.code})：請確認 Firestore 資料庫是否已開啟並設定為「測試模式」`;
                statusText.className = "text-sm text-red-600 font-bold";
            });

            onSnapshot(votesDocRef, (docSnap) => {
                const data = docSnap.exists() ? docSnap.data() : {};
                const labels = voteChart.data.labels;
                const newData = labels.map(label => data[label] || 0);
                voteChart.data.datasets[0].data = newData;
                voteChart.update();
            });

            onSnapshot(wordsDocRef, (docSnap) => {
                const data = docSnap.exists() ? docSnap.data() : {};
                const list = Object.entries(data).map(([word, count]) => [word, count]);
                renderWordCloud(list.length > 0 ? list : [['等待輸入中', 1]]);
            });
        }

        function renderWordCloud(list) {
            const canvas = document.getElementById('wordCloudCanvas');
            WordCloud(canvas, {
                list: list, gridSize: 12, shrinkToFit: true,
                weightFactor: (size) => Math.min(80, 20 + (size * 8)),
                fontFamily: 'system-ui, -apple-system, sans-serif',
                color: 'random-dark', rotateRatio: 0.3, backgroundColor: 'transparent'
            });
        }

        function setupEventListeners() {
            const submitWord = async () => {
                const word = wordInput.value.trim();
                if (!word) return;
                wordInput.value = ''; 
                wordInput.blur(); 
                await setDoc(wordsDocRef, { [word]: increment(1) }, { merge: true });
            };
            submitWordBtn.addEventListener('click', submitWord);
            wordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') submitWord(); });

            toggleAdminBtn.addEventListener('click', async () => {
                if(adminPanel.classList.contains('hidden')) {
                    const pwd = await showModal({ title: '身份驗證', message: '⚠️ 請輸入管理員密碼 (預設：1234)', type: 'prompt' });
                    if (pwd === '1234') {
                        adminPanel.classList.remove('hidden');
                        setTimeout(() => adminPanel.scrollIntoView({ behavior: 'smooth' }), 100);
                    } else if (pwd !== null) {
                        await showModal({ title: '錯誤', message: '❌ 密碼錯誤！', type: 'alert' });
                    }
                } else {
                    adminPanel.classList.add('hidden');
                }
            });

            saveConfigBtn.addEventListener('click', async () => {
                const confirmed = await showModal({ title: '警告', message: '儲存新設定將會【清空目前的投票與文字雲資料】，確定要繼續嗎？', type: 'confirm' });
                if(confirmed) {
                    const newOptions = editPollOptions.value.split(',').map(s => s.trim()).filter(s => s);
                    if(newOptions.length === 0) return await showModal({ title: '錯誤', message: '選項不可為空！', type: 'alert' });

                    saveConfigBtn.innerText = "儲存中...";
                    await setDoc(configDocRef, {
                        pollTitle: editPollTitle.value,
                        pollOptions: newOptions,
                        wordCloudTitle: editWordCloudTitle.value
                    });
                    await setDoc(votesDocRef, {});
                    await setDoc(wordsDocRef, {});
                    
                    adminPanel.classList.add('hidden');
                    saveConfigBtn.innerText = "💾 儲存設定並重置舊資料";
                    await showModal({ title: '成功', message: '✅ 題目設定已更新，活動重新開始！', type: 'alert' });
                }
            });

            clearDataBtn.addEventListener('click', async () => {
                const pwd = await showModal({ title: '身份驗證', message: '⚠️ 管理員專用：請輸入清除密碼 (預設：1234)', type: 'prompt' });
                if (pwd === '1234') { 
                    await setDoc(votesDocRef, {});
                    await setDoc(wordsDocRef, {});
                    await showModal({ title: '成功', message: '✅ 資料已全數清除，可開始新回合！', type: 'alert' });
                } else if (pwd !== null) {
                    await showModal({ title: '錯誤', message: '❌ 密碼錯誤', type: 'alert' });
                }
            });
        }

        initAuth();
    </script>
</body>
</html>
